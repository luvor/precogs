<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#74b9ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Eye symbol - precognition -->
  <ellipse cx="256" cy="256" rx="140" ry="90" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="18" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="52" fill="rgba(255,255,255,0.95)"/>
  <circle cx="256" cy="256" r="24" fill="#6c5ce7"/>
  <!-- Light reflection -->
