  <!-- Subtle rays -->
  <line x1="256" y1="100" x2="256" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
  <line x1="370" y1="140" x2="345" y2="168" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
  <line x1="142" y1="140" x2="167" y2="168" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
</svg>
