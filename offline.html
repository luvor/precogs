---
layout: null
---
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline — Precogs</title>
  <style>
    :root {
      --accent: #2c5282;
      --bg: #f8f7f4;
      --fg: #1a1a2e;
      --muted: #8a8a96;
      color-scheme: light;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .offline {
      text-align: center;
      padding: 2rem;
      max-width: 28rem;
    }
    .offline-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    .offline h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--fg);
    }
    .offline p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .offline-btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline-icon">&#9679;</div>
    <h1>Нет соединения</h1>
    <p>Прекоги временно не могут заглянуть в будущее. Проверьте подключение к интернету и попробуйте снова.</p>
    <button class="offline-btn" onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
